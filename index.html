<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Hub - Твой личный препод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #050505;
            --accent: #8b5cf6;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
        }

        .heading { font-family: 'Unbounded', sans-serif; }
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4); }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #1a1a1a; }
        
        .question-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Главный экран -->
    <div id="setup-screen" class="glass-panel p-8 rounded-[2rem] w-full max-w-lg transition-all">
        <div class="text-center mb-10">
            <h1 class="heading text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 mb-2">STUDY HUB v2</h1>
            <p class="text-slate-500 text-sm">Огромная база знаний 8 класса для тебя, MATB.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Предмет</label>
                <select id="subject-select" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-colors cursor-pointer text-lg text-white">
                    <option value="Алгебра">🔢 Алгебра</option>
                    <option value="Геометрия">📏 Геометрия</option>
                    <option value="Физика">⚡ Физика</option>
                    <option value="Литература">📚 Литература</option>
                    <option value="История">📜 История</option>
                    <option value="Химия">🧪 Химия</option>
                    <option value="Биология">🌿 Биология</option>
                    <option value="География">🌍 География</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Тема занятия</label>
                <input type="text" id="topic-input" list="topic-hints" placeholder="Начни вводить тему..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-all text-lg text-white">
                <datalist id="topic-hints">
                    <option value="Квадратные корни">
                    <option value="Квадратные уравнения">
                    <option value="Мещанин во дворянстве">
                    <option value="Капитанская дочка">
                    <option value="Тепловые явления">
                </datalist>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="initSession('lecture')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📖</span>
                    <span>Лекция</span>
                </button>
                <button onclick="initSession('test')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📝</span>
                    <span>Тест</span>
                </button>
            </div>
        </div>
        
        <div id="api-error" class="mt-6 p-4 bg-purple-500/10 border border-purple-500/20 rounded-xl text-purple-400 text-xs hidden text-center">
            <p id="error-text">Темы нет в базе, использую ИИ для генерации...</p>
        </div>
    </div>

    <!-- Экран Контента -->
    <div id="content-screen" class="hidden w-full max-w-4xl glass-panel p-8 rounded-[2rem] min-h-[600px] flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="window.location.reload()" class="text-slate-500 hover:text-white transition-colors">← Назад</button>
            <div id="status-badge" class="px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold border border-indigo-500/20 uppercase">БАЗА ДАННЫХ</div>
        </div>

        <div id="loading-state" class="flex-grow flex flex-col items-center justify-center space-y-4">
            <div class="loader"></div>
            <p class="text-slate-400 animate-pulse text-sm">Извлекаю данные из архивов...</p>
        </div>

        <div id="result-area" class="hidden space-y-8 pb-10 overflow-y-auto max-h-[70vh] pr-4">
            <!-- Контент -->
        </div>
    </div>

    <script type="module">
        // ==========================================
        // ОГРОМНАЯ ЛОКАЛЬНАЯ БАЗА (MATB SPECIAL)
        // Сюда можно добавлять сотни тем.
        // ==========================================
        const LOCAL_DATABASE = {
            "Алгебра": {
                "Квадратные корни": {
                    lecture: {
                        blocks: [
                            { title: "Определение", text: "Арифметическим квадратным корнем из числа a называется неотрицательное число, квадрат которого равен a.", imgPrompt: "Mathematical square root symbol on a dark background" },
                            { title: "Свойства", text: "Корень из произведения равен произведению корней. Корень из дроби равен корню из числителя, деленному на корень из знаменателя.", imgPrompt: "Algebraic formulas glowing in neon colors" },
                            { title: "Извлечение корня", text: "Процесс нахождения корня называется извлечением. Если число не является полным квадратом, корень будет иррациональным числом.", imgPrompt: "Numbers and symbols floating in space" }
                        ]
                    },
                    test: {
                        questions: [
                            { q: "Чему равен √64?", options: ["6", "7", "8", "9"], correct: 2 },
                            { q: "Вычислите √0,16", options: ["0,4", "0,04", "4", "0,8"], correct: 0 },
                            { q: "√a существует только при...", options: ["a > 0", "a ≥ 0", "a < 0", "любом a"], correct: 1 }
                        ]
                    }
                }
            },
            "Литература": {
                "Мещанин во дворянстве": {
                    lecture: {
                        blocks: [
                            { title: "Автор и эпоха", text: "Комедия-балет Мольера, написанная в 1670 году. Это классицизм в чистом виде, высмеивающий пороки общества.", imgPrompt: "Old French theater stage with baroque decorations" },
                            { title: "Главный герой", text: "Журден — богатый мещанин, который одержим идеей стать дворянином. Его глупость и тщеславие делают его легкой добычей для мошенников.", imgPrompt: "Man in ridiculous expensive clothes looking in the mirror" },
                            { title: "Основной конфликт", text: "Столкновение истинного благородства и пустой внешней формы. Мольер показывает, что образованность нельзя купить за деньги.", imgPrompt: "Struggle between common sense and vanity" }
                        ]
                    },
                    test: {
                        questions: [
                            { q: "Кто написал 'Мещанин во дворянстве'?", options: ["Корнель", "Расин", "Мольер", "Вольтер"], correct: 2 },
                            { q: "Как зовут главного героя?", options: ["Клеонт", "Дорант", "Журден", "Люсиль"], correct: 2 },
                            { q: "Чему Журден удивился на уроке философии?", options: ["Что он говорит прозой", "Что Земля круглая", "Что буквы бывают гласные", "Что латынь сложная"], correct: 0 }
                        ]
                    }
                }
            }
        };

        const API_KEY = "AIzaSyAr5VqsTgBM7vrk5NbsKjZuudjx-u_g5Ek"; 

        const setupScreen = document.getElementById('setup-screen');
        const contentScreen = document.getElementById('content-screen');
        const resultArea = document.getElementById('result-area');
        const loadingState = document.getElementById('loading-state');
        const statusBadge = document.getElementById('status-badge');
        const apiError = document.getElementById('api-error');

        let testQuestions = [];
        let currentIdx = 0;
        let score = 0;

        window.initSession = async (mode) => {
            const topic = document.getElementById('topic-input').value.trim();
            const subject = document.getElementById('subject-select').value;

            if (!topic) return alert("Бля, MATB, тему введи!");

            setupScreen.classList.add('hidden');
            contentScreen.classList.remove('hidden');

            // Пытаемся найти в базе
            const localData = LOCAL_DATABASE[subject]?.[topic];

            if (localData) {
                statusBadge.innerText = "ЛОКАЛЬНАЯ БАЗА";
                setTimeout(() => {
                    loadingState.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    if (mode === 'lecture') renderLecture(topic, localData.lecture);
                    else startTest(localData.test);
                }, 800);
            } else {
                // Если нет в базе - идем к ИИ
                statusBadge.innerText = "ГЕНЕРАЦИЯ ИИ";
                apiError.classList.remove('hidden');
                if (mode === 'lecture') generateAI(subject, topic, 'lecture');
                else generateAI(subject, topic, 'test');
            }
        };

        function renderLecture(topic, data) {
            resultArea.innerHTML = `<h2 class="heading text-4xl font-bold mb-10 text-white">${topic}</h2>`;
            data.blocks.forEach(block => {
                const el = document.createElement('div');
                el.className = "question-card space-y-6 mb-12 border-b border-white/5 pb-10";
                el.innerHTML = `
                    <h3 class="text-2xl font-bold text-purple-400">${block.title}</h3>
                    <div class="text-slate-300 leading-relaxed text-lg">${block.text}</div>
                    <div class="rounded-3xl overflow-hidden bg-white/5 aspect-video flex flex-col items-center justify-center border border-white/5 text-slate-500">
                        <span class="text-4xl mb-2">🖼️</span>
                        <p class="text-[10px] uppercase font-bold tracking-tighter">Visual: ${block.imgPrompt}</p>
                    </div>
                `;
                resultArea.appendChild(el);
            });
        }

        function startTest(data) {
            testQuestions = data.questions;
            currentIdx = 0;
            score = 0;
            renderQuestion();
        }

        function renderQuestion() {
            const q = testQuestions[currentIdx];
            resultArea.innerHTML = `
                <div class="question-card">
                    <div class="flex justify-between text-xs font-bold text-slate-500 mb-6 uppercase tracking-widest">
                        <span>Вопрос ${currentIdx + 1} / ${testQuestions.length}</span>
                        <span class="text-purple-400">Верно: ${score}</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-8 text-white">${q.q}</h2>
                    <div id="options" class="grid grid-cols-1 gap-3"></div>
                </div>
            `;

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl bg-white/5 border border-white/10 hover:border-purple-500 transition-all font-medium text-slate-300";
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = document.querySelectorAll('#options button');
                    all.forEach(b => b.disabled = true);
                    if (i === q.correct) {
                        btn.classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
                        score++;
                    } else {
                        btn.classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-400');
                        all[q.correct].classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
                    }
                    setTimeout(() => {
                        currentIdx++;
                        if (currentIdx < testQuestions.length) renderQuestion();
                        else showFinal();
                    }, 1200);
                };
                document.getElementById('options').appendChild(btn);
            });
        }

        function showFinal() {
            resultArea.innerHTML = `
                <div class="text-center py-10">
                    <h2 class="heading text-4xl font-bold mb-4">Разнос окончен!</h2>
                    <p class="text-slate-400 text-xl mb-10">Результат: ${score} / ${testQuestions.length}</p>
                    <button onclick="window.location.reload()" class="btn-primary px-10 py-4 rounded-2xl font-bold">На главную</button>
                </div>
            `;
        }

        async function generateAI(subject, topic, mode) {
            try {
                const model = "gemini-2.0-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
                
                let prompt = "";
                if (mode === 'lecture') {
                    prompt = `Лекция 8 класс "${topic}" (${subject}). JSON: { "blocks": [{ "title": "...", "text": "...", "imgPrompt": "..." }] }`;
                } else {
                    prompt = `Тест 10 вопросов 8 класс "${topic}". JSON: { "questions": [{ "q": "...", "options": ["..."], "correct": 0 }] }`;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                
                loadingState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                if (mode === 'lecture') renderLecture(topic, content);
                else startTest(content);
            } catch (e) {
                alert("ИИ тоже не вывез: " + e.message);
            }
        }
    </script>
</body>
</html>
