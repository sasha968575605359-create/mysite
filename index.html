<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Hub - Твій препод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #818cf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .option-btn.correct { background-color: rgba(34, 197, 94, 0.2) !important; border-color: #22c55e !important; color: #4ade80 !important; }
        .option-btn.wrong { background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #f87171 !important; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Головний екран -->
    <div id="main-screen" class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl transition-all fade-in">
        <h1 class="text-4xl font-bold mb-6 text-center gradient-text">Study AI</h1>
        <p class="text-slate-400 text-center mb-8">Вибери предмет і тему. Я підготую все за кілька секунд, MATB.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Предмет (НУШ)</label>
                <select id="subject" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="Математика">Математика</option>
                    <option value="Алгебра">Алгебра</option>
                    <option value="Геометрія">Геометрія</option>
                    <option value="Українська мова">Українська мова</option>
                    <option value="Українська література">Українська література</option>
                    <option value="Зарубіжна література">Зарубіжна література</option>
                    <option value="Англійська мова">Англійська мова</option>
                    <option value="Історія України">Історія України</option>
                    <option value="Фізика">Фізика</option>
                    <option value="Хімія">Хімія</option>
                    <option value="Біологія">Біологія</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Тема лекції/тесту</label>
                <input type="text" id="topic" placeholder="Напр: Міщанин Шляхтич" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="startSession('lecture')" class="bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95">📖 Лекція</button>
                <button onclick="startSession('test')" class="bg-purple-600 hover:bg-purple-500 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95">📝 Тест</button>
            </div>
        </div>
    </div>

    <!-- Екран Лекції -->
    <div id="lecture-screen" class="hidden w-full max-w-4xl space-y-6 fade-in">
        <button onclick="goHome()" class="text-slate-400 hover:text-white transition-colors">← Назад</button>
        <div class="glass p-8 rounded-3xl">
            <h2 id="lecture-title" class="text-3xl font-bold mb-6 gradient-text"></h2>
            <div id="lecture-loading" class="flex flex-col items-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-slate-400">Пишу лекцію, MATB, почекай трохи...</p>
            </div>
            <div id="lecture-content" class="space-y-10"></div>
        </div>
    </div>

    <!-- Екран Тесту -->
    <div id="test-screen" class="hidden w-full max-w-2xl fade-in">
        <div class="flex justify-between items-center mb-6">
            <button onclick="goHome()" class="text-slate-400 hover:text-white">← Здатися</button>
            <div id="timer" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-full font-mono font-bold border border-red-500/30">10:00</div>
        </div>
        <div class="glass p-8 rounded-3xl min-h-[400px] flex flex-col">
            <div id="test-loading" class="flex flex-col items-center justify-center flex-grow py-20">
                <div class="loader mb-4"></div>
                <p id="test-status" class="text-slate-400">Створюю питання для геніїв...</p>
                <button id="retry-test-btn" onclick="loadTest()" class="hidden mt-4 bg-slate-700 px-6 py-2 rounded-lg text-sm">Спробувати ще раз</button>
            </div>
            <div id="test-content" class="hidden">
                <div class="flex justify-between text-sm text-slate-400 mb-6">
                    <span id="question-index">Питання 1/16</span>
                    <span id="score-display">Бали: 0</span>
                </div>
                <h3 id="question-text" class="text-2xl font-semibold mb-8"></h3>
                <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-8 bg-indigo-600 py-4 rounded-xl font-bold shadow-lg">Далі →</button>
            </div>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; 
        let currentSubject = "";
        let currentTopic = "";
        let testData = [];
        let currentQuestionIdx = 0;
        let score = 0;
        let isAnswered = false;
        let timerVal = 600;
        let timerInt = null;

        // Чистка JSON від сміття нейронки
        function cleanJSON(text) {
            try {
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}');
                if (start === -1 || end === -1) return null;
                const jsonPart = text.substring(start, end + 1);
                return JSON.parse(jsonPart);
            } catch (e) {
                console.error("JSON Clean Error:", e);
                return null;
            }
        }

        async function askAI(prompt, isTest = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            for (let i = 0; i < 3; i++) {
                try {
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { 
                                temperature: isTest ? 0.1 : 0.7, // Мінімальна температура для стабільного JSON
                                responseMimeType: "application/json"
                            }
                        })
                    });
                    const data = await resp.json();
                    if (!data.candidates || !data.candidates[0]) throw new Error("Empty AI response");
                    
                    const text = data.candidates[0].content.parts[0].text;
                    const parsed = cleanJSON(text);
                    if (parsed) return parsed;
                } catch (e) {
                    console.warn(`Attempt ${i+1} failed...`, e);
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            }
            throw new Error("AI FAILED AFTER RETRIES");
        }

        window.startSession = (type) => {
            currentSubject = document.getElementById('subject').value;
            currentTopic = document.getElementById('topic').value.trim();
            if (!currentTopic) return alert("Введи тему, MATB!");

            document.getElementById('main-screen').classList.add('hidden');
            if (type === 'lecture') {
                document.getElementById('lecture-screen').classList.remove('hidden');
                loadLecture();
            } else {
                document.getElementById('test-screen').classList.remove('hidden');
                loadTest();
            }
        };

        async function loadLecture() {
            document.getElementById('lecture-title').innerText = currentTopic;
            document.getElementById('lecture-loading').classList.remove('hidden');
            const content = document.getElementById('lecture-content');
            content.innerHTML = "";

            const prompt = `Дій як найкращий вчитель у світі. Напиши лекцію для учня на тему "${currentTopic}" (предмет: ${currentSubject}). 
            Розбий на 4 блоки. Для кожного блоку дай imagePrompt для генерації ілюстрації.
            Формат відповіді: JSON { "blocks": [{ "title": "Заголовок", "text": "Текст", "imagePrompt": "опис" }] }`;

            try {
                const data = await askAI(prompt);
                document.getElementById('lecture-loading').classList.add('hidden');
                
                data.blocks.forEach(b => {
                    const block = document.createElement('div');
                    block.className = "fade-in space-y-4";
                    block.innerHTML = `
                        <h3 class="text-2xl font-bold text-indigo-300 border-l-4 border-indigo-500 pl-4">${b.title}</h3>
                        <p class="text-slate-300 text-lg leading-relaxed">${b.text}</p>
                    `;
                    
                    const imgPlaceholder = document.createElement('div');
                    imgPlaceholder.className = "w-full aspect-video rounded-2xl bg-slate-800/50 border border-white/5 flex items-center justify-center overflow-hidden shadow-inner";
                    imgPlaceholder.innerHTML = '<div class="loader"></div>';
                    block.appendChild(imgPlaceholder);
                    content.appendChild(block);

                    generateImage(b.imagePrompt).then(url => {
                        imgPlaceholder.innerHTML = `<img src="${url}" class="w-full h-full object-cover transition-opacity duration-700 opacity-0" onload="this.style.opacity='1'" alt="візуалізація">`;
                    });
                });
            } catch (e) {
                alert("MATB, лекція не завантажилась. Спробуй ще раз.");
                goHome();
            }
        }

        async function generateImage(p) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            try {
                const r = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: { prompt: `${p}, educational digital art style, bright colors, 4k` } })
                });
                const d = await r.json();
                return `data:image/png;base64,${d.predictions[0].bytesBase64Encoded}`;
            } catch { return "https://images.unsplash.com/photo-1454165833767-131f72602f80?q=80&w=800"; }
        }

        window.loadTest = async () => {
            document.getElementById('test-loading').classList.remove('hidden');
            document.getElementById('test-content').classList.add('hidden');
            document.getElementById('retry-test-btn').classList.add('hidden');
            document.getElementById('test-status').innerText = "Створюю питання для геніїв...";

            const prompt = `Створи тест з 16 складних питань на тему "${currentTopic}" (предмет: ${currentSubject}). 
            Один правильний варіант. Тільки JSON формат: { "questions": [{ "q": "Питання", "options": ["А", "Б", "В", "Г"], "correct": 0 }] }`;

            try {
                const data = await askAI(prompt, true);
                testData = data.questions;
                currentQuestionIdx = 0;
                score = 0;
                document.getElementById('test-loading').classList.add('hidden');
                document.getElementById('test-content').classList.remove('hidden');
                renderQuestion();
                startTimer();
            } catch (e) {
                document.getElementById('test-status').innerText = "Помилка генерації. ІІ тупить.";
                document.getElementById('retry-test-btn').classList.remove('hidden');
                document.querySelector('#test-loading .loader').classList.add('hidden');
            }
        };

        function renderQuestion() {
            isAnswered = false;
            document.getElementById('next-btn').classList.add('hidden');
            const q = testData[currentQuestionIdx];
            document.getElementById('question-index').innerText = `Питання ${currentQuestionIdx + 1}/16`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl bg-slate-800 border border-white/5 hover:border-indigo-500/50 transition-all active:scale-[0.98]";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (isAnswered) return;
                    isAnswered = true;
                    if (i === q.correct) {
                        score++;
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        const btns = document.querySelectorAll('.option-btn');
                        if (btns[q.correct]) btns[q.correct].classList.add('correct');
                    }
                    document.getElementById('score-display').innerText = `Бали: ${score}`;
                    document.getElementById('next-btn').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        }

        window.nextQuestion = () => {
            currentQuestionIdx++;
            if (currentQuestionIdx < testData.length) renderQuestion();
            else finishTest();
        };

        function startTimer() {
            clearInterval(timerInt);
            timerVal = 600;
            const timerEl = document.getElementById('timer');
            timerInt = setInterval(() => {
                timerVal--;
                const m = Math.floor(timerVal/60), s = timerVal%60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (timerVal <= 0) finishTest();
            }, 1000);
        }

        function finishTest() {
            clearInterval(timerInt);
            document.getElementById('test-content').innerHTML = `
                <div class="text-center py-10 fade-in">
                    <h2 class="text-4xl font-bold mb-4 gradient-text">Кінець тесту!</h2>
                    <p class="text-xl text-slate-400 mb-8">Твій результат: <span class="text-white font-bold">${score} з ${testData.length}</span></p>
                    <div class="space-y-4">
                        <button onclick="goHome()" class="w-full bg-indigo-600 px-10 py-4 rounded-xl font-bold shadow-lg active:scale-95">На головну</button>
                    </div>
                </div>
            `;
        }

        window.goHome = () => {
            clearInterval(timerInt);
            location.reload();
        };
    </script>
</body>
</html>
