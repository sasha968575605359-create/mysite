<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Hub - Твой личный препод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #050505;
            --accent: #8b5cf6;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
        }

        .heading { font-family: 'Unbounded', sans-serif; }
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4); }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #1a1a1a; }
        
        .question-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        
        .timer-bar {
            height: 4px;
            background: #a855f7;
            width: 100%;
            transition: width 1s linear;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Главный экран -->
    <div id="setup-screen" class="glass-panel p-8 rounded-[2rem] w-full max-w-lg transition-all">
        <div class="text-center mb-10">
            <h1 class="heading text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 mb-2">STUDY HUB v3</h1>
            <p class="text-slate-500 text-sm">18 предметов, жесткие тесты и таймер для MATB.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Предмет (18 дисциплин)</label>
                <select id="subject-select" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-colors cursor-pointer text-lg text-white">
                    <option value="Алгебра">🔢 Алгебра</option>
                    <option value="Геометрия">📏 Геометрия</option>
                    <option value="Физика">⚡ Физика</option>
                    <option value="Химия">🧪 Химия</option>
                    <option value="Биология">🌿 Биология</option>
                    <option value="География">🌍 География</option>
                    <option value="История Украины">📜 История Украины</option>
                    <option value="Всемирная история">🏛️ Всемирная история</option>
                    <option value="Украинский язык">🇺🇦 Украинский язык</option>
                    <option value="Украинская литература">📖 Укр. литература</option>
                    <option value="Английский язык">🇬🇧 Английский язык</option>
                    <option value="Зарубежная литература">📚 Зарубежная лит-ра</option>
                    <option value="Информатика">💻 Информатика</option>
                    <option value="Правоведение">⚖️ Правоведение</option>
                    <option value="Основы здоровья">🏥 Основы здоровья</option>
                    <option value="Искусство">🎨 Искусство</option>
                    <option value="Физическая культура">⚽ Физкультура</option>
                    <option value="Трудовое обучение">🛠️ Трудовое обучение</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Тема занятия</label>
                <input type="text" id="topic-input" list="topic-hints" placeholder="Введи тему..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-all text-lg text-white">
                <datalist id="topic-hints">
                    <option value="Квадратные корни">
                    <option value="Квадратные уравнения">
                    <option value="Мещанин во дворянстве">
                    <option value="Капитанская дочка">
                    <option value="Тепловые явления">
                </datalist>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="initSession('lecture')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📖</span>
                    <span>Лекция</span>
                </button>
                <button onclick="initSession('test')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📝</span>
                    <span>Тест</span>
                </button>
            </div>
        </div>
        
        <div id="api-error" class="mt-6 p-4 bg-purple-500/10 border border-purple-500/20 rounded-xl text-purple-400 text-xs hidden text-center">
            <p id="error-text">Темы нет в базе, использую ИИ для генерации...</p>
        </div>
    </div>

    <!-- Экран Контента -->
    <div id="content-screen" class="hidden w-full max-w-4xl glass-panel p-8 rounded-[2rem] min-h-[600px] flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="exitSession()" class="text-slate-500 hover:text-white transition-colors">← Назад</button>
            <div id="status-badge" class="px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold border border-indigo-500/20 uppercase">ПОДГОТОВКА</div>
        </div>

        <div id="loading-state" class="flex-grow flex flex-col items-center justify-center space-y-4">
            <div class="loader"></div>
            <p class="text-slate-400 animate-pulse text-sm">Собираю инфу для MATB...</p>
        </div>

        <div id="result-area" class="hidden space-y-8 pb-10 overflow-y-auto max-h-[70vh] pr-4">
            <!-- Контент -->
        </div>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyAr5VqsTgBM7vrk5NbsKjZuudjx-u_g5Ek"; 

        const setupScreen = document.getElementById('setup-screen');
        const contentScreen = document.getElementById('content-screen');
        const resultArea = document.getElementById('result-area');
        const loadingState = document.getElementById('loading-state');
        const statusBadge = document.getElementById('status-badge');
        const apiError = document.getElementById('api-error');

        let testQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let timerInterval = null;
        let timeLeft = 0;

        window.exitSession = () => {
            clearInterval(timerInterval);
            window.location.reload();
        };

        window.initSession = async (mode) => {
            const topic = document.getElementById('topic-input').value.trim();
            const subject = document.getElementById('subject-select').value;

            if (!topic) return alert("Бля, MATB, тему введи!");

            setupScreen.classList.add('hidden');
            contentScreen.classList.remove('hidden');

            statusBadge.innerText = "ГЕНЕРАЦИЯ ИИ";
            apiError.classList.remove('hidden');
            
            generateAI(subject, topic, mode);
        };

        async function generateAI(subject, topic, mode) {
            try {
                const model = "gemini-2.0-flash";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
                
                let prompt = "";
                if (mode === 'lecture') {
                    prompt = `Напиши ОГРОМНУЮ лекцию для 8 класса на тему "${topic}" (${subject}). JSON формат: { "blocks": [{ "title": "Заголовок", "text": "Много текста...", "imgPrompt": "English prompt for image" }] }`;
                } else {
                    // Рандомное количество вопросов от 16 до 40
                    const qCount = Math.floor(Math.random() * (40 - 16 + 1)) + 16;
                    prompt = `Создай сложный тест из ${qCount} вопросов для 8 класса на тему "${topic}" (${subject}). 
                    JSON формат: { "questions": [{ "q": "Вопрос", "options": ["А", "Б", "В", "Г"], "correct": 0 }] }`;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API сдохло");

                const data = await response.json();
                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                
                loadingState.classList.add('hidden');
                resultArea.classList.remove('hidden');

                if (mode === 'lecture') {
                    statusBadge.innerText = "МЕГА-ЛЕКЦИЯ";
                    renderLecture(topic, content);
                } else {
                    statusBadge.innerText = "ХАРДКОР-ТЕСТ";
                    startTest(content);
                }
            } catch (e) {
                alert("Ошибка: " + e.message);
                exitSession();
            }
        }

        function renderLecture(topic, data) {
            resultArea.innerHTML = `<h2 class="heading text-4xl font-bold mb-10 text-white">${topic}</h2>`;
            data.blocks.forEach(block => {
                const el = document.createElement('div');
                el.className = "question-card space-y-6 mb-12 border-b border-white/5 pb-10";
                el.innerHTML = `
                    <h3 class="text-2xl font-bold text-purple-400">${block.title}</h3>
                    <div class="text-slate-300 leading-relaxed text-lg">${block.text.replace(/\n/g, '<br>')}</div>
                `;
                resultArea.appendChild(el);
            });
        }

        function startTest(data) {
            testQuestions = data.questions;
            currentIdx = 0;
            score = 0;
            renderQuestion();
        }

        function renderQuestion() {
            clearInterval(timerInterval);
            const q = testQuestions[currentIdx];
            
            // Время на вопрос от 5 до 10 секунд
            timeLeft = Math.floor(Math.random() * (10 - 5 + 1)) + 5;
            const initialTime = timeLeft;

            resultArea.innerHTML = `
                <div class="question-card">
                    <div class="flex justify-between text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">
                        <span>Вопрос ${currentIdx + 1} / ${testQuestions.length}</span>
                        <span class="text-purple-400">Счет: ${score}</span>
                    </div>
                    
                    <div class="w-full bg-white/5 h-1 mb-6 rounded-full overflow-hidden">
                        <div id="timer-bar" class="timer-bar" style="width: 100%"></div>
                    </div>

                    <h2 class="text-2xl font-bold mb-8 text-white">${q.q}</h2>
                    <div id="options" class="grid grid-cols-1 gap-3"></div>
                    <p class="mt-6 text-center text-xs text-slate-600 font-bold uppercase tracking-widest">У тебя ${timeLeft} секунд!</p>
                </div>
            `;

            const bar = document.getElementById('timer-bar');
            timerInterval = setInterval(() => {
                timeLeft--;
                const percent = (timeLeft / initialTime) * 100;
                bar.style.width = percent + '%';
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(-1); // Пропуск по времени
                }
            }, 1000);

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl bg-white/5 border border-white/10 hover:border-purple-500 transition-all font-medium text-slate-300";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i, btn);
                document.getElementById('options').appendChild(btn);
            });
        }

        function handleAnswer(choice, btn = null) {
            clearInterval(timerInterval);
            const correct = testQuestions[currentIdx].correct;
            const all = document.querySelectorAll('#options button');
            all.forEach(b => b.disabled = true);

            if (choice === correct) {
                if (btn) btn.classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
                score++;
            } else {
                if (btn) btn.classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-400');
                if (all[correct]) all[correct].classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
            }

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < testQuestions.length) renderQuestion();
                else showFinal();
            }, 1000);
        }

        function showFinal() {
            resultArea.innerHTML = `
                <div class="text-center py-10">
                    <div class="text-6xl mb-6">🏆</div>
                    <h2 class="heading text-4xl font-bold mb-4">Разнос закончен!</h2>
                    <p class="text-slate-400 text-xl mb-10">Твой итоговый балл: <span class="text-purple-400 font-bold">${score}</span> из ${testQuestions.length}</p>
                    <button onclick="exitSession()" class="btn-primary px-10 py-4 rounded-2xl font-bold">Вернуться к списку</button>
                </div>
            `;
        }
    </script>
</body>
</html>
