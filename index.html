<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Hub - Твой личный препод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #818cf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .correct-answer { background-color: rgba(34, 197, 94, 0.2) !important; border-color: #22c55e !important; color: #4ade80 !important; }
        .wrong-answer { background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; color: #f87171 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Главный экран -->
    <div id="main-screen" class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl transition-all">
        <h1 class="text-4xl font-bold mb-6 text-center gradient-text">Study AI</h1>
        <p class="text-slate-400 text-center mb-8">Выбери предмет и тему, чтобы начать разнос в учебе.</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Предмет (НУШ)</label>
                <select id="subject" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="Математика">Математика</option>
                    <option value="Алгебра">Алгебра</option>
                    <option value="Геометрія">Геометрія</option>
                    <option value="Українська мова">Українська мова</option>
                    <option value="Українська література">Українська література</option>
                    <option value="Зарубіжна література">Зарубіжна література</option>
                    <option value="Англійська мова">Англійська мова</option>
                    <option value="Історія Украины">Історія України</option>
                    <option value="Всесвітня історія">Всесвітня історія</option>
                    <option value="Біологія і екологія">Біологія і екологія</option>
                    <option value="Географія">Географія</option>
                    <option value="Фізика">Фізика</option>
                    <option value="Астрономія">Астрономія</option>
                    <option value="Хімія">Хімія</option>
                    <option value="Інформатика">Інформатика</option>
                    <option value="Правознавство">Правознавство</option>
                    <option value="Мистецтво">Мистецтво</option>
                    <option value="Основи здоров'я">Основи здоров'я</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Тема лекции/теста</label>
                <input type="text" id="topic" placeholder="Напр: Теорема Пифагора" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="startSession('lecture')" class="bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-indigo-500/20">📖 Лекция</button>
                <button onclick="startSession('test')" class="bg-purple-600 hover:bg-purple-500 py-4 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-purple-500/20">📝 Тест</button>
            </div>
        </div>
    </div>

    <!-- Экран лекции -->
    <div id="lecture-screen" class="hidden w-full max-w-4xl space-y-6">
        <button onclick="goHome()" class="text-slate-400 hover:text-white transition-colors">← На главную</button>
        <div class="glass p-8 rounded-3xl">
            <h2 id="lecture-title" class="text-3xl font-bold mb-6 gradient-text"></h2>
            <div id="lecture-loading" class="flex flex-col items-center py-20">
                <div class="loader mb-4"></div>
                <p>ИИ пишет интересную лекцию и рисует картинки...</p>
            </div>
            <div id="lecture-content" class="prose prose-invert max-w-none space-y-6"></div>
        </div>
    </div>

    <!-- Экран теста -->
    <div id="test-screen" class="hidden w-full max-w-2xl">
        <div class="flex justify-between items-center mb-6">
            <button onclick="goHome()" class="text-slate-400 hover:text-white">← Сдаться</button>
            <div id="timer" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-full font-mono font-bold border border-red-500/30">00:00</div>
        </div>
        <div class="glass p-8 rounded-3xl">
            <div id="test-loading" class="flex flex-col items-center py-20">
                <div class="loader mb-4"></div>
                <p>ИИ придумывает сложные вопросы...</p>
            </div>
            <div id="test-content" class="hidden">
                <div class="flex justify-between text-sm text-slate-400 mb-4">
                    <span id="question-index">Вопрос 1 из 16</span>
                    <span id="score-display">Баллы: 0</span>
                </div>
                <h3 id="question-text" class="text-2xl font-semibold mb-8"></h3>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>
                <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-8 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all shadow-lg shadow-indigo-500/20">Далее →</button>
            </div>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; 

        let currentSubject = "";
        let currentTopic = "";
        let timerInterval = null;
        let testData = [];
        let currentQuestionIdx = 0;
        let score = 0;
        let isAnswered = false;

        window.startSession = async (type) => {
            currentSubject = document.getElementById('subject').value;
            currentTopic = document.getElementById('topic').value;

            if (!currentTopic.trim()) {
                alert("Введи тему, MATB!");
                return;
            }

            document.getElementById('main-screen').classList.add('hidden');
            
            if (type === 'lecture') {
                document.getElementById('lecture-screen').classList.remove('hidden');
                generateLecture();
            } else {
                document.getElementById('test-screen').classList.remove('hidden');
                generateTest();
            }
        };

        window.goHome = () => {
            clearInterval(timerInterval);
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('lecture-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('lecture-content').innerHTML = "";
            document.getElementById('test-content').classList.add('hidden');
        };

        async function fetchAI(prompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const data = await response.json();
                    let text = data.candidates[0].content.parts[0].text;
                    
                    // Очистка от Markdown-мусора, если он пролез
                    text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    return JSON.parse(text);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        async function generateLecture() {
            document.getElementById('lecture-title').innerText = currentTopic;
            document.getElementById('lecture-loading').classList.remove('hidden');
            
            const prompt = `Напиши ИНТЕРЕСНУЮ лекцию на тему "${currentTopic}" по предмету "${currentSubject}". 
            Верни СТРОГО JSON без лишних слов: { "blocks": [{ "title": "строка", "text": "строка", "imagePrompt": "описание для генерации картинки" }] }`;

            try {
                const data = await fetchAI(prompt);
                const container = document.getElementById('lecture-content');
                container.innerHTML = "";
                
                for (let block of data.blocks) {
                    const blockEl = document.createElement('div');
                    blockEl.className = "space-y-4 animate-fade-in";
                    blockEl.innerHTML = `<h3 class="text-2xl font-bold text-indigo-300">${block.title}</h3><p class="text-slate-300 text-lg">${block.text}</p>`;
                    
                    const imgDiv = document.createElement('div');
                    imgDiv.className = "w-full aspect-video rounded-2xl bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-700 relative";
                    imgDiv.innerHTML = `<div class="loader"></div>`;
                    blockEl.appendChild(imgDiv);
                    container.appendChild(blockEl);

                    generateImage(block.imagePrompt).then(url => {
                        imgDiv.innerHTML = `<img src="${url}" class="w-full h-full object-cover" alt="lecture image">`;
                    });
                }
                document.getElementById('lecture-loading').classList.add('hidden');
            } catch (e) {
                alert("Ошибка ИИ. Попробуй обновить страницу.");
                goHome();
            }
        }

        async function generateImage(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ instances: { prompt: prompt + " digital art style" }, parameters: { sampleCount: 1 } })
                });
                const data = await response.json();
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            } catch (e) {
                return "https://via.placeholder.com/800x450?text=Image+Error";
            }
        }

        async function generateTest() {
            document.getElementById('test-loading').classList.remove('hidden');
            document.getElementById('test-content').classList.add('hidden');

            const prompt = `Создай тест из 16 вопросов на тему "${currentTopic}" (${currentSubject}). 
            Верни СТРОГО JSON: { "questions": [{ "q": "вопрос", "options": ["а", "б", "в", "г"], "correct": 0 }] }`;

            try {
                const data = await fetchAI(prompt);
                testData = data.questions;
                currentQuestionIdx = 0;
                score = 0;
                showQuestion();
                document.getElementById('test-loading').classList.add('hidden');
                document.getElementById('test-content').classList.remove('hidden');
            } catch (e) {
                alert("Тест не сгенерировался. Возможно, слишком сложная тема.");
                goHome();
            }
        }

        function showQuestion() {
            if (currentQuestionIdx >= testData.length) {
                finishTest();
                return;
            }

            isAnswered = false;
            document.getElementById('next-btn').classList.add('hidden');
            
            const q = testData[currentQuestionIdx];
            document.getElementById('question-index').innerText = `Вопрос ${currentQuestionIdx + 1} из ${testData.length}`;
            document.getElementById('score-display').innerText = `Баллы: ${score}`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl bg-slate-800 border border-slate-700 hover:border-indigo-500 transition-all hover:bg-slate-700";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                container.appendChild(btn);
            });

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            let timeLeft = 600; // 10 минут
            const updateUI = () => {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (!isAnswered) checkAnswer(-1, null);
                }
                timeLeft--;
            };
            updateUI();
            timerInterval = setInterval(updateUI, 1000);
        }

        function checkAnswer(selectedIdx, btn) {
            if (isAnswered) return;
            isAnswered = true;
            clearInterval(timerInterval);
            
            const correct = testData[currentQuestionIdx].correct;
            const buttons = document.querySelectorAll('.option-btn');

            buttons[correct].classList.add('correct-answer');

            if (selectedIdx === correct) {
                score++;
            } else if (selectedIdx !== -1 && btn) {
                btn.classList.add('wrong-answer');
            }

            document.getElementById('next-btn').classList.remove('hidden');
        }

        window.nextQuestion = () => {
            currentQuestionIdx++;
            showQuestion();
        };

        function finishTest() {
            const container = document.getElementById('test-content');
            container.innerHTML = `
                <div class="text-center py-10">
                    <h2 class="text-4xl font-bold mb-4 gradient-text">Тест окончен!</h2>
                    <p class="text-2xl mb-8">Результат: <span class="text-indigo-400 font-bold">${score} / ${testData.length}</span></p>
                    <button onclick="goHome()" class="bg-indigo-600 px-8 py-3 rounded-xl font-bold">На главную</button>
                </div>
            `;
        }
    </script>
</body>
</html>
