<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Hub - Твой личный препод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bg: #050505;
            --accent: #8b5cf6;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0; 
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
        }

        .heading { font-family: 'Unbounded', sans-serif; }
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4); }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #a855f7;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option { background: #1a1a1a; }
        
        .question-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Главный экран -->
    <div id="setup-screen" class="glass-panel p-8 rounded-[2rem] w-full max-w-lg transition-all">
        <div class="text-center mb-10">
            <h1 class="heading text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 mb-2">STUDY AI</h1>
            <p class="text-slate-500 text-sm">Выбери предмет и начни разнос в учебе, MATB.</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Предмет</label>
                <select id="subject-select" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-colors cursor-pointer text-lg text-white">
                    <option value="Математика">📐 Математика</option>
                    <option value="Алгебра">🔢 Алгебра</option>
                    <option value="Геометрия">📏 Геометрия</option>
                    <option value="Физика">⚡ Физика</option>
                    <option value="Химия">🧪 Химия</option>
                    <option value="Биология">🌿 Биология</option>
                    <option value="Информатика">💻 Информатика</option>
                    <option value="История">📜 История</option>
                    <option value="География">🌍 География</option>
                    <option value="Литература">📚 Литература</option>
                    <option value="Зарубежная литература">📖 Зарубежная литература</option>
                    <option value="Украинский язык">🇺🇦 Украинский язык</option>
                    <option value="Английский язык">🇬🇧 Английский язык</option>
                    <option value="Правоведение">⚖️ Правоведение</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Тема занятия</label>
                <input type="text" id="topic-input" placeholder="Напр: Мещанин во дворянстве" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-purple-500 transition-all text-lg text-white">
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4">
                <button onclick="initSession('lecture')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📖</span>
                    <span>Лекция</span>
                </button>
                <button onclick="initSession('test')" class="btn-primary p-5 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <span class="text-2xl">📝</span>
                    <span>Тест</span>
                </button>
            </div>
        </div>
        
        <div id="api-error" class="mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs hidden">
            <p id="error-text">Ошибка: Проверь API Key!</p>
        </div>
    </div>

    <!-- Экран Контента -->
    <div id="content-screen" class="hidden w-full max-w-4xl glass-panel p-8 rounded-[2rem] min-h-[600px] flex flex-col">
        <div class="flex justify-between items-center mb-8">
            <button onclick="window.location.reload()" class="text-slate-500 hover:text-white transition-colors">← Назад</button>
            <div id="status-badge" class="px-4 py-1 rounded-full bg-purple-500/10 text-purple-400 text-xs font-bold border border-purple-500/20 uppercase">ГОТОВЛЮ...</div>
        </div>

        <div id="loading-state" class="flex-grow flex flex-col items-center justify-center space-y-4">
            <div class="loader"></div>
            <p class="text-slate-400 animate-pulse text-sm">ИИ генерирует контент для тебя...</p>
        </div>

        <div id="result-area" class="hidden space-y-8 pb-10 overflow-y-auto max-h-[70vh] pr-4">
            <!-- Сюда вставляется лекция или тест -->
        </div>
    </div>

    <script type="module">
        // ==========================================
        // МАТБ, ТВОЙ КЛЮЧ ПЕРЕПРОВЕРЕН!
        // ==========================================
        const API_KEY = "AIzaSyAr5VqsTgBM7vrk5NbsKjZuudjx-u_g5Ek"; 
        // ==========================================

        const setupScreen = document.getElementById('setup-screen');
        const contentScreen = document.getElementById('content-screen');
        const resultArea = document.getElementById('result-area');
        const loadingState = document.getElementById('loading-state');
        const statusBadge = document.getElementById('status-badge');
        const apiError = document.getElementById('api-error');
        const errorText = document.getElementById('error-text');

        let testQuestions = [];
        let currentIdx = 0;
        let score = 0;

        window.initSession = async (mode) => {
            const topic = document.getElementById('topic-input').value.trim();
            const subject = document.getElementById('subject-select').value;

            if (!API_KEY) {
                showError("Бля, MATB, вставь API Key!");
                return;
            }

            if (!topic) {
                alert("Введи тему, не тупи!");
                return;
            }

            setupScreen.classList.add('hidden');
            contentScreen.classList.remove('hidden');
            apiError.classList.add('hidden');
            
            if (mode === 'lecture') generateLecture(subject, topic);
            else generateTest(subject, topic);
        };

        function showError(msg) {
            setupScreen.classList.remove('hidden');
            contentScreen.classList.add('hidden');
            apiError.classList.remove('hidden');
            errorText.innerText = msg;
        }

        async function fetchAI(prompt, sys) {
            // Исправленная модель для v1beta
            const model = "gemini-1.5-flash"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: sys }] },
                        generationConfig: { 
                            responseMimeType: "application/json", 
                            temperature: 0.7
                        }
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || "Ошибка API");
                }

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                return JSON.parse(text);
            } catch (e) {
                console.error(e);
                throw e;
            }
        }

        async function generateLecture(subject, topic) {
            try {
                const prompt = `Напиши подробную лекцию на русском языке про "${topic}" (Предмет: ${subject}). 
                Раздели на 3 логических блока. Для каждого блока придумай описание для картинки на английском.
                Стиль: современный, молодежный, но информативный.
                JSON формат: { "blocks": [{ "title": "Заголовок", "text": "Текст", "imgPrompt": "English image description" }] }`;
                
                const data = await fetchAI(prompt, "Ты крутой преподаватель. Объясняешь сложные вещи просто. Обращаешься на 'ты'.");
                
                loadingState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                statusBadge.innerText = "ЛЕКЦИЯ";
                
                resultArea.innerHTML = `<h2 class="heading text-4xl font-bold mb-10 text-white">${topic}</h2>`;
                
                data.blocks.forEach(block => {
                    const el = document.createElement('div');
                    el.className = "question-card space-y-6 mb-12 border-b border-white/5 pb-10";
                    el.innerHTML = `
                        <h3 class="text-2xl font-bold text-purple-400">${block.title}</h3>
                        <div class="text-slate-300 leading-relaxed text-lg">${block.text.replace(/\n/g, '<br>')}</div>
                        <div class="rounded-3xl overflow-hidden bg-white/5 aspect-video flex flex-col items-center justify-center border border-white/5 text-slate-500 p-4 text-center">
                            <span class="text-4xl mb-2">🖼️</span>
                            <p class="text-xs uppercase tracking-widest font-bold">Визуализация: ${block.imgPrompt}</p>
                            <p class="text-[10px] mt-2 text-slate-600">[Здесь должна быть иллюстрация по теме]</p>
                        </div>
                    `;
                    resultArea.appendChild(el);
                });
            } catch (e) {
                showError("Ошибка: " + e.message);
            }
        }

        async function generateTest(subject, topic) {
            try {
                const prompt = `Создай тест из 10 вопросов на русском языке по теме "${topic}" (${subject}).
                JSON формат: { "questions": [{ "q": "Вопрос", "options": ["Вариант 1", "Вариант 2", "Вариант 3", "Вариант 4"], "correct": 0 }] }`;
                
                const data = await fetchAI(prompt, "Ты эксперт-экзаменатор. Делаешь интересные вопросы.");
                testQuestions = data.questions;
                
                loadingState.classList.add('hidden');
                resultArea.classList.remove('hidden');
                statusBadge.innerText = "ТЕСТ";
                currentIdx = 0;
                score = 0;
                renderQuestion();
            } catch (e) {
                showError("Ошибка при создании теста: " + e.message);
            }
        }

        function renderQuestion() {
            const q = testQuestions[currentIdx];
            resultArea.innerHTML = `
                <div class="question-card">
                    <div class="flex justify-between text-xs font-bold text-slate-500 mb-6 uppercase tracking-widest">
                        <span>Вопрос ${currentIdx + 1} / ${testQuestions.length}</span>
                        <span class="text-purple-400">Правильно: ${score}</span>
                    </div>
                    <h2 class="text-2xl font-bold mb-8 text-white">${q.q}</h2>
                    <div id="options" class="grid grid-cols-1 gap-3"></div>
                </div>
            `;

            const optsDiv = document.getElementById('options');
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl bg-white/5 border border-white/10 hover:border-purple-500 transition-all font-medium text-slate-300 hover:text-white";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i, btn);
                optsDiv.appendChild(btn);
            });
        }

        function handleAnswer(choice, btn) {
            const correct = testQuestions[currentIdx].correct;
            const allBtns = document.querySelectorAll('#options button');
            allBtns.forEach(b => b.disabled = true);

            if (choice === correct) {
                btn.classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
                score++;
            } else {
                btn.classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-400');
                allBtns[correct].classList.add('bg-green-500/20', 'border-green-500/50', 'text-green-400');
            }

            setTimeout(() => {
                currentIdx++;
                if (currentIdx < testQuestions.length) renderQuestion();
                else showResults();
            }, 1200);
        }

        function showResults() {
            resultArea.innerHTML = `
                <div class="text-center py-10 question-card">
                    <div class="text-6xl mb-6">🎓</div>
                    <h2 class="heading text-4xl font-bold mb-4">Результат</h2>
                    <p class="text-slate-400 text-xl mb-10">Ты набрал <span class="text-purple-400 font-bold">${score}</span> баллов из ${testQuestions.length}</p>
                    <div class="flex flex-col gap-3">
                        <button onclick="window.location.reload()" class="btn-primary px-10 py-4 rounded-2xl font-bold">К новым темам</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
